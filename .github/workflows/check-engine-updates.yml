name: Check calendar-engine updates

# Daily check for a newer @partybuff/calendar-engine release on GitHub
# Packages. When the published version is ahead of our lockfile, open a PR
# that bumps the dependency and our own patch version (merging that PR cuts
# a fresh calendar.js release via release.yml). This is the ONLY place the
# engine dependency gets bumped — nobody edits package.json by hand.
#
# target-branch mode: when an engine release and the wrapper compat code
# for it are COUPLED (the bump alone fails main's tests, and the compat
# code alone fails against the old pin), dispatch this workflow ON the
# feature branch with target-branch set to that branch — it bumps the pin,
# regenerates the lockfile, validates against THAT branch's code, and
# pushes the bump commit onto it, so pin + compat land and CI together.
on:
  schedule:
    - cron: '23 8 * * *'   # daily, 08:23 UTC
  workflow_dispatch:
    inputs:
      target-branch:
        description: >-
          Existing branch to bump IN PLACE (pin + lockfile committed onto
          it; no PR is opened). Leave empty for the default open-a-PR
          behavior against the default branch.
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # target-branch mode checks out the branch being bumped; default
          # mode uses the dispatching/scheduled ref (the default branch).
          ref: ${{ inputs.target-branch || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Bump in place on target branch
        if: inputs.target-branch != ''
        env:
          PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
        run: |
          set -euo pipefail
          LATEST=$(npm view @partybuff/calendar-engine version)
          LOCKED=$(node -p "require('./package-lock.json').packages['node_modules/@partybuff/calendar-engine'].version")
          if [ "$LATEST" = "$LOCKED" ]; then
            echo "already on $LOCKED; nothing to bump"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          npm pkg set "dependencies.@partybuff/calendar-engine=^$LATEST"
          npm version patch --no-git-tag-version
          npm install   # regenerates package-lock.json against the new engine

          # Validate against THIS branch's code (the whole point of
          # target-branch mode: the compat code lives here).
          npm run typecheck
          npm test
          npm run build
          node ./test/calendar_smoke.mjs

          git add package.json package-lock.json
          git commit -m "chore: bump @partybuff/calendar-engine to ^$LATEST (target-branch mode)"
          git push origin "HEAD:${{ inputs.target-branch }}"

      - name: Compare published vs locked engine version
        if: inputs.target-branch == ''
        id: ver
        env:
          PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
        run: |
          LATEST=$(npm view @partybuff/calendar-engine version)
          LOCKED=$(node -p "require('./package-lock.json').packages['node_modules/@partybuff/calendar-engine'].version")
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "locked=$LOCKED" >> "$GITHUB_OUTPUT"
          if [ "$LATEST" = "$LOCKED" ]; then
            echo "up to date ($LOCKED)"
            echo "behind=false" >> "$GITHUB_OUTPUT"
          else
            echo "behind: locked=$LOCKED latest=$LATEST"
            echo "behind=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open bump PR
        if: steps.ver.outputs.behind == 'true'
        env:
          PACKAGES_TOKEN: ${{ secrets.PACKAGES_TOKEN }}
          # A PAT lets the PR's CI run and auto-merge work; falls back to the
          # default token (PR is created, but you may need to merge by hand).
          GH_TOKEN: ${{ secrets.AUTOMATION_PAT || secrets.GITHUB_TOKEN }}
          LATEST: ${{ steps.ver.outputs.latest }}
          LOCKED: ${{ steps.ver.outputs.locked }}
        run: |
          set -euo pipefail
          BRANCH="auto/engine-bump-$LATEST"
          # Don't reopen a PR we already raised for this version.
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "branch $BRANCH already exists; nothing to do"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          npm pkg set "dependencies.@partybuff/calendar-engine=^$LATEST"
          npm version patch --no-git-tag-version
          npm install   # regenerates package-lock.json against the new engine

          # Validate before proposing the change so a reviewer (or auto-merge)
          # is acting on a known-good bump.
          npm run typecheck
          npm test
          npm run build
          node ./test/calendar_smoke.mjs

          git add package.json package-lock.json
          git commit -m "chore: bump @partybuff/calendar-engine to ^$LATEST"
          git push -u origin "$BRANCH"

          gh pr create --base main --head "$BRANCH" \
            --title "Bump calendar-engine to $LATEST" \
            --body "Automated dependency bump: \`@partybuff/calendar-engine\` published \`$LATEST\` (was \`$LOCKED\`). The lockfile was regenerated and typecheck, tests, build, and the smoke check all passed in the bump job. Merging this cuts a new \`calendar.js\` release."

          gh pr merge "$BRANCH" --auto --squash \
            || echo "Auto-merge unavailable (enable 'Allow auto-merge' + a required check, or merge manually)."
